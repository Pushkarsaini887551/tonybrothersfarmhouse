<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>केयर कैलकुलेटर - Tony Brothers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@600;700&family=Hind:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-canvas: #f3f6ee;
            --card-bg: #fffefb;
            --text-primary: #23301c;
            --text-secondary: #6c7a63;
            --primary-green: #1f4d2c;
            --light-green: #e7efdf;
            --gold: #c1892e;
            --gold-light: #faf1de;
            --border-color: #dde3d3;
            --shadow-md: 0 14px 30px -8px rgba(31,40,20,0.14), 0 4px 8px -2px rgba(31,40,20,0.05);
            --font-display: 'Noto Serif Devanagari', serif;
            --font-body: 'Hind', sans-serif;
            --font-label: 'Poppins', 'Hind', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-body); }
        body {
            background: var(--bg-canvas);
            padding: 24px 16px;
            color: var(--text-primary);
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 34px 28px;
            border-radius: 6px 22px 6px 22px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-green) 0%, var(--primary-green) 70%, var(--gold) 100%);
        }
        h1 {
            font-family: var(--font-display);
            color: var(--primary-green);
            text-align: center;
            font-size: 1.7rem;
            margin-bottom: 6px;
        }
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.92rem;
            margin-bottom: 22px;
        }
        label {
            font-family: var(--font-label);
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        select {
            width: 100%;
            padding: 13px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1.5px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 1rem;
        }
        select:focus { outline: none; border-color: var(--gold); }
        button {
            width: 100%;
            padding: 15px;
            margin-top: 16px;
            background: var(--primary-green);
            color: white;
            border: 2px solid var(--gold);
            border-radius: 30px;
            cursor: pointer;
            font-family: var(--font-label);
            font-weight: 600;
            font-size: 0.98rem;
        }
        button:hover { opacity: 0.92; }
        .back-btn {
            background: var(--card-bg) !important;
            color: var(--text-secondary) !important;
            border: 1.5px solid var(--border-color) !important;
            margin-top: 12px;
        }
        #result {
            margin-top: 22px;
            padding: 18px;
            background: var(--light-green);
            border-radius: 4px 16px 4px 16px;
            display: none;
            border-left: 5px solid var(--gold);
            line-height: 1.7;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧮 केयर कैलकुलेटर</h1>
    <p class="subtitle">अपने पौधे के हिसाब से सिंचाई सलाह पाएं</p>
    <label>पौधे का प्रकार चुनें:</label>
    <select id="plantType">
        <option value="cactus">कैक्टस (Cactus)</option>
        <option value="flower">फूल वाले पौधे (Flowering)</option>
        <option value="vegetable">सब्जियाँ (Vegetables)</option>
    </select>
    <button onclick="calculateCare()">पानी की जरूरत बताएं</button>

    <div id="result"></div>
    <button class="back-btn" onclick="location.href='index.html'">⬅️ वापस टूल्स पर जाएं</button>
</div>

<script>
    function calculateCare() {
        const type = document.getElementById('plantType').value;
        const resultDiv = document.getElementById('result');
        let info = "";

        if (type === "cactus") info = "कैक्टस को हफ्ते में सिर्फ एक बार पानी दें।";
        else if (type === "flower") info = "फूल वाले पौधों को हर दूसरे दिन पानी दें।";
        else if (type === "vegetable") info = "सब्जियों को रोज सुबह पानी देना जरूरी है।";

        resultDiv.innerHTML = "<strong>सुझाव:</strong> " + info;
        resultDiv.style.display = "block";
    }
</script>
</body>
</html>
