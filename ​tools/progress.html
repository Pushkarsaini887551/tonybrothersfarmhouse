<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>प्रोग्रेस ट्रैकर - Tony Brothers</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2e7d32; text-align: center; }
        .progress-bg { background: #ddd; height: 30px; border-radius: 15px; margin-top: 20px; overflow: hidden; }
        #progressBar { background: #4caf50; height: 100%; width: 0%; transition: width 0.5s; }
        button { width: 100%; padding: 15px; margin-top: 15px; background: #2e7d32; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 प्रोग्रेस ट्रैकर</h1>
    <p>बीज से पौधे की प्रोग्रेस:</p>
    
    <div class="progress-bg"><div id="progressBar"></div></div>
    
    <button onclick="updateProgress()">प्रोग्रेस बढ़ाएं (10%)</button>
    <br>
    <button style="background: #718096;" onclick="location.href='index.html'">⬅️ वापस टूल्स पर जाएं</button>
</div>

<script>
    let width = 0;
    function updateProgress() {
        if (width < 100) {
            width += 10;
            document.getElementById('progressBar').style.width = width + "%";
        } else {
            alert("पौधा पूरा तैयार हो गया है!");
        }
    }
</script>
</body>
</html>
