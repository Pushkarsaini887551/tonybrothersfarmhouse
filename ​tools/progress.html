<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>प्रोग्रेस ट्रैकर - Tony Brothers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@600;700&family=Hind:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-canvas: #f3f6ee;
            --card-bg: #fffefb;
            --text-primary: #23301c;
            --text-secondary: #6c7a63;
            --primary-green: #1f4d2c;
            --light-green: #e7efdf;
            --gold: #c1892e;
            --border-color: #dde3d3;
            --shadow-md: 0 14px 30px -8px rgba(31,40,20,0.14), 0 4px 8px -2px rgba(31,40,20,0.05);
            --font-display: 'Noto Serif Devanagari', serif;
            --font-body: 'Hind', sans-serif;
            --font-label: 'Poppins', 'Hind', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-body); }
        body { background: var(--bg-canvas); padding: 24px 16px; color: var(--text-primary); }
        .container {
            max-width: 600px; margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 34px 28px;
            border-radius: 6px 22px 6px 22px;
            box-shadow: var(--shadow-md);
            position: relative; overflow: hidden;
        }
        .container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--primary-green) 0%, var(--primary-green) 70%, var(--gold) 100%);
        }
        h1 { font-family: var(--font-display); color: var(--primary-green); text-align: center; font-size: 1.7rem; margin-bottom: 6px; }
        .subtitle { text-align: center; color: var(--text-secondary); font-size: 0.92rem; margin-bottom: 22px; }
        .progress-bg {
            background: var(--light-green);
            height: 30px; border-radius: 15px; margin-top: 10px;
            overflow: hidden; border: 1.5px solid var(--border-color);
        }
        #progressBar {
            background: linear-gradient(90deg, var(--primary-green), var(--gold));
            height: 100%; width: 0%; transition: width 0.5s;
        }
        button {
            width: 100%; padding: 15px; margin-top: 18px;
            background: var(--primary-green); color: white;
            border: 2px solid var(--gold); border-radius: 30px;
            cursor: pointer; font-family: var(--font-label); font-weight: 600; font-size: 0.98rem;
        }
        .back-btn { background: var(--card-bg) !important; color: var(--text-secondary) !important; border: 1.5px solid var(--border-color) !important; margin-top: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 प्रोग्रेस ट्रैकर</h1>
    <p class="subtitle">बीज से पौधे की प्रोग्रेस</p>

    <div class="progress-bg"><div id="progressBar"></div></div>

    <button onclick="updateProgress()">प्रोग्रेस बढ़ाएं (10%)</button>
    <button class="back-btn" onclick="location.href='index.html'">⬅️ वापस टूल्स पर जाएं</button>
</div>

<script>
    let width = 0;
    function updateProgress() {
        if (width < 100) {
            width += 10;
            document.getElementById('progressBar').style.width = width + "%";
        } else {
            alert("पौधा पूरा तैयार हो गया है!");
        }
    }
</script>
</body>
</html>
