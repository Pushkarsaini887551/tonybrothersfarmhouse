<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tony Brothers Farm House</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">

<img src="profile.jpg">

<h2>Tony Brothers Farm House</h2>

</div>

<ul>

<li><a href="#">Home</a></li>

<li><a href="#">Trees</a></li>

<li><a href="#">Medicinal</a></li>

<li><a href="#">Gallery</a></li>

<li><a href="#">About</a></li>

<li><a href="#">Contact</a></li>

</ul>

</nav>

</header>

<section class="slider">

<div class="slides fade">
<img src="slide1.jpg">
</div>

<div class="slides fade">
<img src="slide2.jpg">
</div>

<div class="slides fade">
<img src="slide3.jpg">
</div>

</section>

<section class="hero">

<h1>🌳 भारत के पेड़ों की पूरी जानकारी</h1>

<p>1000+ भारतीय पेड़ों की जानकारी एक ही जगह</p>

<div class="search">

<input
type="text"
id="searchInput"
placeholder="पेड़ का नाम लिखें..."
onkeyup="showSuggestions()"
onkeypress="if(event.key==='Enter') searchTree()">

<button onclick="searchTree()" class="btn">

Search

</button>

<div id="suggestions"></div>

</div>

</section>

<section class="categories">

<button onclick="filterTrees('all')">🌳 सभी</button>

<button onclick="filterTrees('फलदार')">🥭 फलदार</button>

<button onclick="filterTrees('औषधीय')">🌿 औषधीय</button>

<button onclick="filterTrees('जंगल')">🌲 जंगल</button>

<button onclick="filterTrees('सजावटी')">🌸 सजावटी</button>

</section>

<div id="result"></div>

<footer>

<h3>🌳 Tony Brothers Farm House</h3>

<p>भारत के पेड़ों की सबसे बड़ी जानकारी वेबसाइट</p>

<p>© 2026 All Rights Reserved</p>

</footer>

<script src="script.js"></script>

</body>

</html>
