<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Brothers Farm House - पेड़ों की जानकारी</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .header-banner {
            background: #27ae60;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        .header-banner h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .search-container {
            text-align: center;
            margin: 30px 0;
        }
        #searchBar {
            padding: 12px 20px;
            width: 80%;
            max-width: 500px;
            border: 2px solid #27ae60;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .tree-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-top: 5px solid #27ae60;
            transition: transform 0.2s;
        }
        .tree-card:hover {
            transform: translateY(-5px);
        }
        .tree-title {
            color: #27ae60;
            margin-top: 0;
        }
        .sci-name {
            font-style: italic;
            color: #7f8c8d;
            font-size: 14px;
        }
        .info-item {
            margin: 8px 0;
            font-size: 14px;
        }
        .info-item strong {
            color: #34495e;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #2c3e50;
            color: white;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        <h1>🌳 Tony Brothers Farm House 🌳</h1>
        <p>1000+ भारतीय पेड़ों की जानकारी एक ही जगह</p>
    </div>
    
    <div class="search-container">
        <input type="text" id="searchBar" placeholder="पेड़ या बीमारी का नाम खोजें (जैसे: शुगर, पथरी, तुलसी)..." onkeyup="filterTrees()">
    </div>

    <div class="grid-container" id="treeGrid"></div>

    <footer>
        <p>© 2026 Tony Brothers Farm House | All Rights Reserved</p>
    </footer>

    <script>
        let treeData = {};

        // JSON फ़ाइल से डेटा लोड करना
        fetch('trees.json')
            .then(response => response.json())
            .then(data => {
                treeData = data;
                displayTrees(treeData);
            })
            .catch(error => console.error('डेटा लोड करने में एरर:', error));

        // स्क्रीन पर कार्ड्स दिखाना
        function displayTrees(data) {
            const grid = document.getElementById('treeGrid');
            grid.innerHTML = '';

            for (let key in data) {
                const tree = data[key];
                const card = `
                    <div class="tree-card">
                        <h2 class="tree-title">${tree.hindiName}</h2>
                        <p class="sci-name">🧬 ${tree.scientificName} (${tree.englishName})</p>
                        <div class="info-item"><strong>📍 कहाँ:</strong> ${tree.location}</div>
                        <div class="info-item"><strong>💧 पानी:</strong> ${tree.water}</div>
                        <div class="info-item"><strong>🌸 फूल:</strong> ${tree.flowers}</div>
                        <div class="info-item"><strong>💊 उपयोग:</strong> ${tree.uses.join(', ')}</div>
                        <p style="font-size:13px; color:#555; background:#eef9f2; padding:8px; border-radius:5px;">
                            <strong>विवरण:</strong> ${tree.description}
                        </p>
                    </div>
                `;
                grid.innerHTML += card;
            }
        }

        // लाइव सर्च फ़िल्टर
        function filterTrees() {
            const text = document.getElementById('searchBar').value.toLowerCase();
            const filtered = {};

            for (let key in treeData) {
                const tree = treeData[key];
                if (tree.hindiName.toLowerCase().includes(text) || 
                    tree.scientificName.toLowerCase().includes(text) || 
                    tree.uses.join(' ').toLowerCase().includes(text)) {
                    filtered[key] = tree;
                }
            }
            displayTrees(filtered);
        }
    </script>
</body>
</html>
