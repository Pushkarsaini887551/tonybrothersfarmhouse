<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Brothers - Smart Dashboard Tools</title>
    <style>
        :root {
            --bg-canvas: #f4f7f5;
            --card-bg: #ffffff;
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --primary-green: #2e7d32;
            --light-green: #e8f5e9;
            --border-color: #e2e8f0;
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        [data-theme="dark"] {
            --bg-canvas: #121814;
            --card-bg: #1e2521;
            --text-primary: #f7fafc;
            --text-secondary: #a0aec0;
            --light-green: #1b2e24;
            --border-color: #2d3748;
        }
        body {
            background: var(--bg-canvas);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
        }
        .back-btn {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }
        .smart-dashboard {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--shadow-md);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }
        .tool-box {
            background: var(--bg-canvas);
            border-left: 4px solid var(--primary-green);
            border-radius: 8px;
            padding: 15px;
        }
        .tool-box h4 {
            margin: 0 0 10px 0;
            color: var(--primary-green);
        }
        .tool-select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 0.95em;
        }
        .weather-info {
            font-size: 0.95em;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .calendar-badge {
            display: inline-block;
            background: var(--light-green);
            color: var(--primary-green);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
        }
        .results-box {
            margin-top: 25px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: none;
        }
        .plant-link-card {
            background: var(--bg-canvas);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid var(--primary-green);
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="../index.html" class="back-btn">⬅️ होम पेज पर वापस जाएं</a>
        
        <h2 style="color: var(--primary-green); margin-bottom: 20px;">🛠️ टोनी ब्रदर्स स्मार्ट कृषि टूल्स</h2>

        <div class="smart-dashboard">
            <div class="tool-box">
                <h4>🧪 आयुर्वेदिक रोग-निवारक</h4>
                <select id="symptomFilter" class="tool-select" onchange="filterBySymptom(this.value)">
                    <option value="all">-- बीमारी/समस्या चुनें --</option>
                    <option value="त्वचा">त्वचा रोग / पिंपल्स</option>
                    <option value="बुखार">बुखार / डेंगू</option>
                    <option value="इम्युनिटी">रोग प्रतिरोधक क्षमता</option>
                    <option value="पाचन">पाचन तंत्र / पेट गैस</option>
                    <option value="बाल">बालों का झड़ना / रूसी</option>
                    <option value="खांसी">सर्दी, खांसी और जुकाम</option>
                </select>
            </div>

            <div class="tool-box">
                <h4>🌡️ लाइव मौसम व सिंचाई गाइड</h4>
                <div id="weatherWidget" class="weather-info">मौसम डेटा लोड हो रहा है...</div>
            </div>

            <div class="tool-box">
                <h4>📅 AI प्लांट शेड्यूलर</h4>
                <div class="weather-info">चालू महीना: <span class="calendar-badge" id="currentMonthBadge">...</span></div>
                <button class="tool-select" style="margin-top:8px; background:var(--primary-green); color:white; font-weight:bold; cursor:pointer; border:none;" onclick="filterByCurrentSeason()">
                    इस महीने के पौधे खोजें
                </button>
            </div>
        </div>

        <div id="toolsResults" class="results-box">
            <h3 style="color: var(--primary-green); margin-bottom: 15px;" id="resultsTitle">खोज परिणाम</h3>
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        let plantDatabase = [];

        // मुख्य फोल्डर से डेटाबेस फेच करना
        async function loadData() {
            try {
                const response = await fetch('../plants-data.json');
                const rawData = await response.json();
                plantDatabase = Object.keys(rawData).map(key => ({ id: key, ...rawData[key] }));
                
                // महीना सेट करना
                const months = ["जनवरी", "फरवरी", "मार्च", "अप्रैल", "मई", "जून", "जुलाई", "अगस्त", "सितंबर", "अक्टूबर", "नवंबर", "दिसंबर"];
                document.getElementById('currentMonthBadge').innerText = months[new Date().getMonth()];
                
                // मौसम सलाह
                document.getElementById('weatherWidget').innerHTML = `<b>अनुमानित तापमान:</b> 32°C<br><b>💧 सलाह:</b> सुबह या शाम को पानी देना सबसे उत्तम है।`;
            } catch (e) {
                console.error("डेटा लोड नहीं हुआ", e);
            }
        }

        function showResults(title, list) {
            const box = document.getElementById('toolsResults');
            const content = document.getElementById('resultsContent');
            document.getElementById('resultsTitle').innerText = title;
            box.style.display = 'block';
            content.innerHTML = '';

            if(list.length === 0) {
                content.innerHTML = `<p style="color:gray;">कोई पौधा नहीं मिला।</p>`;
                return;
            }

            list.forEach(p => {
                content.innerHTML += `
                    <div class="plant-link-card">
                        <strong>🌳 ${p.hindiName || p.id}</strong> (${p.scientificName || ''})<br>
                        <small style="color:gray;">उपयोग: ${Array.isArray(p.uses) ? p.uses.join(', ') : (p.uses || 'N/A')}</small>
                    </div>`;
            });
        }

        function filterBySymptom(val) {
            if(val === 'all') { document.getElementById('toolsResults').style.display = 'none'; return; }
            const res = plantDatabase.filter(p => {
                const txt = ((p.hindiName||'') + (p.description||'') + (p.uses?p.uses.join(''):'')).toLowerCase();
                return txt.includes(val.toLowerCase());
            });
            showResults(`🧪 ${val} के इलाज के लिए उपयोगी पौधे:`, res);
        }

        function filterByCurrentSeason() {
            const months = ["जनवरी", "फरवरी", "मार्च", "अप्रैल", "मई", "जून", "जुलाई", "अगस्त", "सितंबर", "अक्टूबर", "नवंबर", "दिसंबर"];
            const currentMonth = months[new Date().getMonth()].toLowerCase();
            const res = plantDatabase.filter(p => {
                const season = p.season ? p.season.toLowerCase() : '';
                return season.includes(currentMonth) || season.includes('वर्ष भर') || season.includes('सदाबहार');
            });
            showResults(`📅 इस महीने उगाए जाने वाले पौधे:`, res);
        }

        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
