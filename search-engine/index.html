<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Brothers - Advanced Search Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- वापस मुख्य होमपेज पर जाने का बटन -->
    <div class="back-nav">
        <a href="../index.html" class="back-btn">← मुख्य होम पेज पर वापस जाएं</a>
    </div>

    <div class="search-container">
        <div class="search-header">
            <h1>🌿 वनस्पति अनुसंधान इंजन</h1>
            <p>किसी भी पौधे का नाम, बीमारी या उपयोग टाइप करके लाइव सर्च करें</p>
        </div>

        <!-- प्रीमियम ग्लोइंग सर्च बार -->
        <div class="premium-search-wrapper">
            <div class="search-glowing-box">
                <input type="text" id="classicSearch" class="premium-search-input" placeholder="यहाँ लिखना शुरू करें..." oninput="suggestionEngine.trigger(this)">
                <button id="micBtn" class="mic-premium-btn" onclick="voiceSearchEngine.listen()" title="बोलकर सर्च करें">🎙️</button>
                <button class="premium-action-btn" onclick="searchEngine.executeFilter()">खोजें</button>
                <button class="premium-reset-btn" onclick="searchEngine.resetAll()">रीसेट</button>
            </div>
            <!-- सजेशन ड्रॉपडाउन -->
            <div class="suggestion-panel" id="suggestionBox"></div>
        </div>

        <!-- कैटेगरी फ़िल्टर -->
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="searchEngine.filterCategory('all', this)">🌱 कुल पौधे</button>
            <button class="filter-btn" onclick="searchEngine.filterCategory('medicinal', this)">🩺 मुख्य औषधियां</button>
            <button class="filter-btn" onclick="searchEngine.filterCategory('fruit', this)">🍎 फलदार पौधे</button>
        </div>

        <!-- लाइव रिजल्ट ग्रिड -->
        <div class="cards-grid" id="plantsGrid"></div>
    </div>

    <footer>
        <p>© 2026 Tony Brothers Farm House | Powered by Search Engine Module</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
