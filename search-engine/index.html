<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Brothers - Advanced Botanical System</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #e8f5e9;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --bg-light: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-light);
            color: var(--text-main);
        }
        .header {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        .search-container {
            max-width: 600px;
            margin: -25px auto 20px auto;
            background: white;
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            position: relative;
        }
        .search-input {
            flex: 1;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            outline: none;
            border-radius: 50px;
        }
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            padding: 10px;
        }
        .suggestion-box {
            position: absolute;
            top: 100%;
            left: 5%;
            width: 90%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: none;
            z-index: 100;
            max-height: 250px;
            overflow-y: auto;
            margin-top: 5px;
        }
        .suggest-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }
        .suggest-item:hover {
            background: var(--primary-light);
        }
        .category-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px auto;
            flex-wrap: wrap;
            max-width: 800px;
        }
        .filter-btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>टोनी ब्रदर्स फार्म हाउस में आपका स्वागत है</h2>
        <p>प्राकृतिक शुद्धता, जैविक कृषि संवर्धन एवं दुर्लभ जड़ी-बूटियों का डिजिटल कॉरिडोर</p>
    </div>

    <div class="search-container">
        <input type="text" id="classicSearch" class="search-input" placeholder="पौधा, बीमारी या विवरण टाइप करें..." oninput="window.suggestionEngine.trigger(this)">
        <button class="icon-btn" onclick="window.voiceSearchEngine.listen()">🎙️</button>
        <button class="icon-btn" onclick="window.searchEngine.executeFilter()">🔍</button>
        <button class="icon-btn" onclick="window.searchEngine.resetAll()" title="Clear">❌</button>
        <div id="suggestionBox" class="suggestion-box"></div>
    </div>

    <div class="category-bar">
        <button class="filter-btn active" onclick="window.searchEngine.filterCategory('all', this)">🌱 सब कुछ देखें</button>
        <button class="filter-btn" onclick="window.searchEngine.filterCategory('medicinal', this)">💊 मुख्य औषधियां</button>
        <button class="filter-btn" onclick="window.searchEngine.filterCategory('fruit', this)">🍎 फलदार पौधे</button>
    </div>

    <div id="plantsGrid"></div>

    <script src="search-engine/script.js"></script>
</body>
</html>
